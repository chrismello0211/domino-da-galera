/* ---------- mesa / corrente ---------- */
function boardArea(){
  const r = $('#board').getBoundingClientRect();
  const top = window.innerHeight < 540 ? 62 : 82;
  const bottom = 14;
  const side = r.width < 480 ? 46 : 72;
  return { w: Math.max(120, r.width - side * 2), h: Math.max(120, r.height - top - bottom),
           cx: r.width / 2, cy: top + (r.height - top - bottom) / 2, rw: r.width, rh: r.height };
}
function currentMaxX(){
  const a = boardArea();
  return a.w > a.h ? 7 : 5;
}
function renderBoard(showSlots){
  if (!view.st) return;
  const st = view.st;
  const chain = $('#chain');
  const hint = $('#boardHint');
  chain.innerHTML = '';
  const dm0 = $('#dorme');
  const temDorme = st.per * (st.n || 4) < 28;
  dm0.style.display = temDorme ? '' : 'none';
  if (temDorme) {
    if (dm0.dataset.dyn !== '1') {
      dm0.dataset.dyn = '1';
      dm0.innerHTML = '<span class="dbacks"></span><span class="dlabel">DORME</span>';
    }
    const nd = st.dorme.length;
    const db = dm0.querySelector('.dbacks');
    if (db.dataset.n != nd) { db.dataset.n = nd; db.innerHTML = '<span class="mback"></span>'.repeat(Math.min(nd, 7)); }
    const mostraN = st.buy || st.burro || (st.n || 4) === 2;
    dm0.querySelector('.dlabel').textContent = 'DORME' + (mostraN ? ' ×' + nd : '');
  }
  if (!st.line.length) {
    hint.classList.remove('hidden');
    hint.textContent = st.turn === view.mySeat
      ? (st.forced ? 'Você tem a maior carroça — ela abre o jogo' : 'Sua vez de abrir a mesa')
      : seatName(st.turn) + (st.forced ? ' abre com a maior carroça…' : ' vai abrir o jogo…');
    chain.style.transform = 'translate(0,0) scale(1)';
    return;
  }
  hint.classList.add('hidden');

  const { tiles, slots } = CORE.layoutChain(st.line, st.anchor, currentMaxX());
  const lastId = st.lastPlay ? st.lastPlay.tileId : null;

  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  const consider = r => {
    minX = Math.min(minX, r.x); minY = Math.min(minY, r.y);
    maxX = Math.max(maxX, r.x + r.w); maxY = Math.max(maxY, r.y + r.h);
  };
  tiles.forEach(consider);
  const e = CORE.ends(st);
  const ghostEnds = [];
  if (showSlots && selected && st.turn === view.mySeat) {
    legal.filter(m => m.tile.id === selected).forEach(m => {
      ghostEnds.push({ end: m.end, slot: slots[m.end], v: m.end === 'L' ? e.L : e.R });
    });
    ghostEnds.forEach(g => consider(g.slot));
  }

  for (const t of tiles) {
    const d = document.createElement('div');
    d.className = 'tile ' + (t.vert ? 'v' : 'h') + (t.id === lastId ? ' last' : '');
    if (t.id === lastId && t.id !== poppedId && !reduceMotion) {
      d.classList.add('pop'); poppedId = t.id;
      const pf = document.createElement('span');
      pf.className = 'puff';
      pf.style.cssText = `left:${t.x * U + t.w * U / 2}px; top:${t.y * U + t.h * U / 2}px;`;
      chain.appendChild(pf);
      setTimeout(() => { try { pf.remove(); } catch (e) {} }, 520);
      chain.classList.remove('thud'); void chain.offsetWidth; chain.classList.add('thud');
    }
    const rot = ((hash(t.id) % 5) - 2) * 0.8;
    d.style.cssText = `left:${t.x * U + 2.5}px; top:${t.y * U + 2.5}px; width:${t.w * U - 5}px; height:${t.h * U - 5}px; --rot:${rot}deg;`;
    d.setAttribute('aria-label', `pedra ${t.v1} e ${t.v2}`);
    d.innerHTML = tileInner(t.v1, t.v2);
    chain.appendChild(d);
  }
  for (const g of ghostEnds) {
    const d = document.createElement('div');
    d.className = 'ghost';
    d.dataset.end = g.end;
    d.style.cssText = `left:${g.slot.x * U + 2.5}px; top:${g.slot.y * U + 2.5}px; width:${g.slot.w * U - 5}px; height:${g.slot.h * U - 5}px;`;
    d.innerHTML = `<span class="gv">${g.v}</span>`;
    d.onclick = ev => { ev.stopPropagation(); onHumanPlay && onHumanPlay(selected, g.end); };
    chain.appendChild(d);
  }

  // escala pra caber na mesa
  const a = boardArea();
  const pad = 0.5;
  const bw = (maxX - minX + pad * 2) * U, bh = (maxY - minY + pad * 2) * U;
  const s = Math.min(a.w / bw, a.h / bh, 1.3 * (window.__TILEK || 1));
  const cx = (minX + maxX) / 2 * U, cy = (minY + maxY) / 2 * U;
  const offY = a.cy - a.rh / 2;
  chain.style.transform = `translate(${-cx * s}px, ${(-cy * s) + offY}px) scale(${s})`;
}

/* ---------- minha mão ---------- */
function orderedHand(){
  const hand = view.st.hands[view.mySeat];
  const map = new Map(hand.map(t => [t.id, t]));
  const out = [];
  for (const id of handOrder) if (map.has(id)) { out.push(map.get(id)); map.delete(id); }
  for (const t of map.values()) out.push(t);
  handOrder = out.map(t => t.id);
  return out;
}

/* ---------- minha mão: toque OU arrasto (pra cima = jogar, pro lado = organizar) ---------- */
function renderHand(dealAnim){
  if (!view.st) return;
  killFloaters();
  const st = view.st;
  const hb = $('#hand');
  hb.innerHTML = '';
  const myTurn = st.turn === view.mySeat && !st.finished && !busy;
  $('#handbar').classList.toggle('myturn', myTurn);
  const chip = $('#turnChip');
  if (st.finished) chip.classList.add('hidden');
  else if (window.__PICKME) { chip.classList.add('hidden'); }
  else if (myTurn) { chip.classList.remove('hidden'); chip.className = ''; chip.id = 'turnChip'; chip.textContent = 'SUA VEZ'; }
  else if (window.__PICKWAIT) {
    chip.classList.remove('hidden'); chip.className = 'wait'; chip.id = 'turnChip';
    chip.textContent = '🤝 dupla vencedora escolhendo quem sai…';
  }
  else if (st.burro && !st.hands[view.mySeat].length) {
    chip.classList.remove('hidden'); chip.className = 'wait'; chip.id = 'turnChip';
    chip.textContent = '✔ você bateu — assistindo';
  }
  else {
    chip.classList.remove('hidden'); chip.className = 'wait'; chip.id = 'turnChip';
    chip.textContent = st.turn === view.mySeat ? 'sua vez…' : 'vez de ' + seatName(st.turn) + '…';
  }

  legal = (myTurn && !window.__PICKME) ? CORE.legalMoves(st, view.mySeat) : [];
  const playIds = new Set(legal.map(m => m.tile.id));

  const canBuy = myTurn && st.buy && !legal.length && st.dorme.length > 0;
  const dm = $('#dorme');
  if (dm) {
    dm.classList.toggle('buyable', canBuy);
    dm.onclick = canBuy ? () => { SND.tap(); onHumanBuy && onHumanBuy(); } : null;
  }
  const bh = $('#boardHint');
  if (bh) {
    if (canBuy) { bh.textContent = 'Sem encaixe — toca no DORME pra comprar 🐴'; bh.classList.remove('hidden'); bh.dataset.buy = '1'; }
    else if (bh.dataset.buy) { bh.classList.add('hidden'); bh.dataset.buy = ''; }
  }
  orderedHand().forEach((t, i) => {
    const d = document.createElement('div');
    const can = myTurn && playIds.has(t.id);
    d.className = 'ht'
      + (hintsOn && can ? ' playable' : '')
      + (hintsOn && myTurn && !can ? ' dim' : '')
      + (selected === t.id ? ' sel' : '');
    d.style.setProperty('--hrot', (((hash(t.id + 'h') % 5) - 2) * 0.7) + 'deg');
    if (dealAnim && !reduceMotion) d.style.animationDelay = (i * 75) + 'ms';
    else d.style.animation = 'none';
    d.dataset.id = t.id;
    if (st.lastBuy && st.lastBuy.p === view.mySeat && st.lastBuy.tileId === t.id) d.classList.add('bought');
    d.innerHTML = halfHTML(t.a) + halfHTML(t.b) + '<span class="mid"></span><span class="pin"></span>';
    d.setAttribute('aria-label', `pedra ${t.a} e ${t.b}`);
    d.onclick = () => {
      if (suppressClick) { suppressClick = false; return; }
      if (!myTurn) return;
      if (!can) { d.classList.add('shake'); setTimeout(() => d.classList.remove('shake'), 320); SND.tap(); return; }
      SND.tap(); vibrate(8);
      const moves = legal.filter(m => m.tile.id === t.id);
      const uniq = [...new Set(moves.map(m => m.end))];
      if (uniq.length === 1) { onHumanPlay && onHumanPlay(t.id, uniq[0]); return; }
      selected = (selected === t.id) ? null : t.id;
      renderHand();
      renderBoard(!!selected);
    };
    d.onpointerdown = ev => startDrag(ev, d, t, can, myTurn);
    hb.appendChild(d);
  });
}

/* arrasto: decide entre JOGAR (sobe) e ORGANIZAR (pro lado)
   Blindado pra celular: eventos na JANELA (não na pedra), limpeza
   automática de fantasmas e clique liberado por timer. */
function killFloaters(){
  document.querySelectorAll('.ht.float').forEach(x => { try { x.remove(); } catch (e) {} });
  document.querySelectorAll('#hand .ht.dragging').forEach(x => x.classList.remove('dragging'));
  document.querySelectorAll('#chain .ghost.hot').forEach(g => g.classList.remove('hot'));
}
document.addEventListener('visibilitychange', () => { if (document.hidden) killFloaters(); });

let dragBusy = false;
function startDrag(ev, el, tile, can, myTurn){
  if (ev.button !== undefined && ev.button !== 0) return;
  if (dragBusy) return;
  dragBusy = true;
  const st0 = view.st;
  const pid = ev.pointerId;
  const drag = { mode: null, hot: null, clone: null, moved: false, done: false, t0: Date.now(), s0: 0, eixoX: true };
  const pai = el.parentNode;
  const sx = ev.clientX, sy = ev.clientY;
  try { el.setPointerCapture(pid); } catch (e) {}

  const makeClone = e => {
    const r = el.getBoundingClientRect();
    const c = el.cloneNode(true);
    c.classList.add('float');
    c.classList.remove('sel', 'dim', 'playable');
    c.style.width = r.width + 'px'; c.style.height = r.height + 'px';
    c.style.animation = 'none';
    document.body.appendChild(c);
    drag.clone = c;
    moveClone(e);
  };
  const moveClone = e => {
    if (!drag.clone) return;
    drag.clone.style.left = (e.clientX - drag.clone.offsetWidth / 2) + 'px';
    drag.clone.style.top  = (e.clientY - drag.clone.offsetHeight * .6) + 'px';
  };

  const onMove = e => {
    if (e.pointerId !== pid) return;
    if (!el.isConnected) return finish(e);          // a mão re-renderizou no meio
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (!drag.mode) {
      if (Math.hypot(dx, dy) < 12) return;
      drag.moved = true; suppressClick = true;
      // jogar = o dedo SAIU do rodapé (pra cima no retrato, pro lado no deitado);
      // organizar = seguiu dentro dele
      const hb = $('#handbar').getBoundingClientRect();
      const barraDeitada = hb.width > hb.height;          // retrato: rodapé largo
      const fora = e.clientY < hb.top - 6 || e.clientX < hb.left - 6 ||
                   e.clientX > hb.right + 6 ||
                   (barraDeitada && dy < -16 && Math.abs(dy) > Math.abs(dx));
      // mão lotada: deslizada RÁPIDA no eixo da fila = rolar; segurou um instante = organizar
      const segurou = Date.now() - drag.t0 >= 170;
      const podeRolar = barraDeitada ? pai.scrollWidth > pai.clientWidth + 4
                                     : pai.scrollHeight > pai.clientHeight + 4;
      const noEixo = barraDeitada ? Math.abs(dx) > Math.abs(dy) : Math.abs(dy) > Math.abs(dx);
      if (!fora && !segurou && podeRolar && noEixo) {
        drag.mode = 'scroll';
        drag.eixoX = barraDeitada;
        drag.s0 = barraDeitada ? pai.scrollLeft : pai.scrollTop;
        return;
      }
      if (fora) {
        if (!myTurn || !can) {
          drag.mode = 'deny';
          el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 320);
          return;
        }
        drag.mode = 'play';
        selected = tile.id;
        renderBoard(true);
        el.classList.add('dragging');
        makeClone(e);
        SND.tap();
      } else {
        drag.mode = 'sort';
        el.classList.add('dragging');
        makeClone(e);
        SND.sort(.45, rnd(1.05, 1.18));
      }
      return;
    }
    if (drag.mode === 'scroll') {
      if (drag.eixoX) pai.scrollLeft = drag.s0 - dx;
      else pai.scrollTop = drag.s0 - dy;
      return;
    }
    if (drag.mode === 'play') {
      moveClone(e);
      // o alvo é onde a PEDRA está (ela flutua acima do dedo), não o dedo
      const ch = drag.clone ? drag.clone.offsetHeight : 0;
      const cx = e.clientX, cy = e.clientY - ch * .10;
      let hot = null, near = null, nd = 1e9;
      document.querySelectorAll('#chain .ghost').forEach(g => {
        const r = g.getBoundingClientRect();
        const inside = cx >= r.left - 12 && cx <= r.right + 12 &&
                       cy >= r.top - 12 && cy <= r.bottom + 12;
        if (inside) hot = g;
        const d = Math.hypot(cx - (r.left + r.width / 2), cy - (r.top + r.height / 2));
        if (d < nd) { nd = d; near = g; }
      });
      if (!hot && near && nd < 58) hot = near;   // ímã: perto o bastante já vale
      document.querySelectorAll('#chain .ghost').forEach(g => g.classList.toggle('hot', g === hot));
      drag.hot = hot ? hot.dataset.end : null;
    } else if (drag.mode === 'sort') {
      moveClone(e);
      // saiu do rodapé com a pedra? então é jogada (retrato: pra cima; deitado: pro lado)
      const hb2 = $('#handbar').getBoundingClientRect();
      const saiu = e.clientY < hb2.top - 6 || e.clientX < hb2.left - 6 || e.clientX > hb2.right + 6;
      if (saiu && myTurn && can) {
        drag.mode = 'play';
        selected = tile.id;
        renderBoard(true);
        SND.tap();
        return;
      }
      if (!el.parentNode) return;
      // rola sozinho quando o dedo encosta na borda da fila
      const pr = pai.getBoundingClientRect();
      if (pai.scrollWidth > pai.clientWidth + 4) {
        if (e.clientX < pr.left + 34) pai.scrollLeft -= 9;
        else if (e.clientX > pr.right - 34) pai.scrollLeft += 9;
      }
      if (pai.scrollHeight > pai.clientHeight + 4) {
        if (e.clientY < pr.top + 30) pai.scrollTop -= 9;
        else if (e.clientY > pr.bottom - 30) pai.scrollTop += 9;
      }
      // alvo em coordenadas de CONTEÚDO (imune ao pula-pula do scroll)
      const px = e.clientX - pr.left + pai.scrollLeft;
      const py = e.clientY - pr.top + pai.scrollTop;
      const sibs = [...pai.children].filter(x => x !== el);
      let alvo = null, ac = null, best = 1e9;
      for (const s of sibs) {
        const r = s.getBoundingClientRect();
        const cx = r.left - pr.left + pai.scrollLeft + r.width / 2;
        const cy = r.top - pr.top + pai.scrollTop + r.height / 2;
        const d = Math.hypot(px - cx, py - cy);
        if (d < best) { best = d; alvo = s; ac = { cx, cy, w: r.width, h: r.height }; }
      }
      let target = null;
      if (alvo) {
        const antes = py < ac.cy - ac.h * .12 ? true
                    : py > ac.cy + ac.h * .12 ? false
                    : px < ac.cx;
        target = antes ? alvo : alvo.nextSibling;
      }
      if (target !== el.nextSibling) {
        el.parentNode.insertBefore(el, target);
        handOrder = [...el.parentNode.children].map(x => x.dataset.id);
        if (Date.now() - lastSortSnd > 180) { lastSortSnd = Date.now(); SND.sort(.32, rnd(1.1, 1.25)); }
      }
    }
  };

  const finish = e => {
    if (drag.done) return;
    drag.done = true;
    dragBusy = false;
    window.removeEventListener('pointermove', onMove, true);
    window.removeEventListener('pointerup', finish, true);
    window.removeEventListener('pointercancel', finish, true);
    window.removeEventListener('blur', finish);
    try { el.releasePointerCapture(pid); } catch (err) {}
    if (drag.clone) { try { drag.clone.remove(); } catch (err) {} drag.clone = null; }
    el.classList.remove('dragging');
    document.querySelectorAll('#chain .ghost').forEach(g => g.classList.remove('hot'));
    if (drag.mode === 'play') {
      if (drag.hot && view.st === st0 && !busy) {
        vibrate(12);
        onHumanPlay && onHumanPlay(tile.id, drag.hot);
      } else {
        selected = null;
        renderHand();
        renderBoard(false);
      }
    } else if (drag.mode === 'sort') {
      SND.sort(.85, rnd(.88, .98));
      renderHand();
    }
    setTimeout(() => { suppressClick = false; }, 300);   // solta o clique com folga
  };

  window.addEventListener('pointermove', onMove, true);
  window.addEventListener('pointerup', finish, true);
  window.addEventListener('pointercancel', finish, true);
  window.addEventListener('blur', finish);
}

/* ---------- fim de mão: revelação ---------- */
function revealHTML(){
  const st = view.st, f = st.finished;
  const myT = TEAM_OF(view.mySeat);
  let head, sub;
  if (f.type === 'burro') {
    const souEu = f.burro === view.mySeat;
    head = souEu ? '🐴 Você ficou por último!' : `🐴 ${esc(seatName(f.burro))} ficou por último!`;
    const prox = 4 + ((view.m && view.m.pen && view.m.pen[f.burro]) || 0) + 1;
    sub = f.how === 'tranca'
      ? `trancou — mais peso na mão leva o castigo · próxima com <span class="pt">${prox}</span> pedras`
      : `leva <span class="pt">+1</span> pedra — próxima rodada com <span class="pt">${prox}</span>`;
  } else if (f.type === 'batida') {
    const kindTx = { simples: 'batida simples', carroça: 'batida de carroça',
                     'lá-e-lô': 'lá-e-lô!', cruzada: 'CRUZADA!' }[f.kind];
    const mine = f.team === myT;
    head = mine ? '🎉 ' + (f.player === view.mySeat ? 'Você bateu!' : seatName(f.player) + ' bateu!') 
                : seatName(f.player) + ' bateu…';
    sub = `${kindTx} · <span class="pt">+${f.points}</span> pra ${(st.n || 4) === 2 ? (mine ? 'você' : esc(seatName(1 - myT))) : (mine ? 'NÓS' : 'ELES')}`;
  } else {
    head = '🔒 Trancou!';
    sub = f.team == null ? 'Empate no peso — ninguém pontua'
        : `Menos pedra na mão: <span class="pt">+1</span> pra ${(st.n || 4) === 2 ? (f.team === myT ? 'você' : esc(seatName(1 - myT))) : (f.team === myT ? 'NÓS' : 'ELES')}`;
  }
  const n = st.n || 4;
  const medal = p => {
    if (!st.burro) return '';
    if (f.type === 'burro' && p === f.burro) return '🐴 ';
    const i = (st.out || []).indexOf(p);
    return i >= 0 ? (['🥇 ', '🥈 ', '🥉 '][i] || '✔ ') : '';
  };
  const rows = Array.from({ length: n }, (_, p) => {
    const h = st.hands[p] || [];
    return `<div class="rrow">
      <span class="rn">${medal(p)}${p === view.mySeat ? 'Você' : esc(seatName(p))}</span>
      <span class="rt">${h.length ? h.map(t => miniTile(t.a, t.b)).join('') : '<i style="opacity:.6">bateu</i>'}</span>
      <span class="rs">${CORE.handSum(h)}</span>
    </div>`;
  }).join('');
  const dorme = st.dorme.length
    ? `<div class="rrow"><span class="rn">Dorme</span><span class="rt">${st.dorme.map(t => miniTile(t.a, t.b)).join('')}</span><span class="rs">${CORE.handSum(st.dorme)}</span></div>`
    : '';
  const sums = st.hands.map(CORE.handSum);
  const tMy = n === 2 ? sums[myT] : sums[myT] + sums[myT + 2];
  const tOp = n === 2 ? sums[1 - myT] : sums[1 - myT] + sums[(1 - myT) + 2];
  const teamsum = st.burro ? '' :
    `<div class="teamsum"><span class="${tMy <= tOp ? 'win' : ''}">Nós: ${tMy} na mão</span>
     <span class="${tOp <= tMy ? 'win' : ''}">Eles: ${tOp}</span></div>`;
  return `<h2>${head}</h2><p class="sub">${sub}</p>
    <div class="reveal">${rows}${dorme}${teamsum}</div>`;
}

let curPropIdx = -1;
function rerollProp(){
  const set = PROPS[curTheme.id] || [];
  if (!set.length) return;
  let i = Math.floor(Math.random() * set.length);
  if (set.length > 1 && i === curPropIdx) i = (i + 1) % set.length;
  curPropIdx = i;
  const el = $('#propSlot');
  if (el) el.innerHTML = set[i];
}

/* luz do dia: a mesa acompanha a hora do celular */
function dayTint(){
  if (curTheme.id === 'madruga') return 'transparent';
  const h = new Date().getHours();
  if (h < 6)  return 'rgba(24,32,64,.16)';
  if (h < 11) return 'rgba(255,246,214,.10)';
  if (h < 17) return 'transparent';
  if (h < 20) return 'rgba(255,160,80,.13)';
  return 'rgba(26,36,66,.15)';
}
function rerollAmbience(){
  rerollProp();
  const t = $('#dayTint');
  if (t) t.style.background = dayTint();
}

let curTheme = THEMES[0];

function applyTheme(t, save){
  curTheme = t;
  const r = document.documentElement.style;
  THEME_VARS.forEach(k => r.setProperty('--' + k, t[k]));
  document.body.dataset.theme = t.id;
  const mc = document.querySelector('meta[name="theme-color"]');
  if (mc) mc.setAttribute('content', t.meta);
  const lbl = $('#themeName'); if (lbl) lbl.textContent = t.n;
  if (curSkin && curSkin.id !== 'auto') applySkin(curSkin);
  curPropIdx = -1;
  rerollAmbience();
  if (save) store.set('dom_theme', t.id);
}
function initialTheme(){
  const saved = store.get('dom_theme');
  return THEMES.find(t => t.id === saved) || themeOfDay();
}

  });

function loadStats(){ try { return JSON.parse(store.get('dom_stats')) || { v: 0, d: 0 }; } catch (e) { return { v: 0, d: 0 }; } }
function bumpStats(win){ const s = loadStats(); win ? s.v++ : s.d++; store.set('dom_stats', JSON.stringify(s)); }
function statsLine(){
  const s = loadStats(), el = $('#statsLine');
  if (!el) return;
  if (!s.v && !s.d) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  el.textContent = `na sua conta: ${s.v} ${s.v === 1 ? 'vitória' : 'vitórias'} · ${s.d} ${s.d === 1 ? 'derrota' : 'derrotas'}`;
}

function localHumanBuy(){
  const st = view.st;
  if (!LOCAL.on || busy || !st || st.finished || st.turn !== 0) return;
  if (!st.buy || CORE.legalMoves(st, 0).length || !st.dorme.length) return;
  CORE.applyBuy(st, 0);
  SND.deal(1); vibrate(6);
  renderAll();
  if (!CORE.legalMoves(st, 0).length && !st.dorme.length) {
    setTimeout(() => {
      if (!LOCAL.on || view.st !== st || st.turn !== 0 || st.finished) return;
      showPassBar(() => {
        if (!LOCAL.on || view.st !== st || st.turn !== 0 || st.finished) return;
        SND.pass(); vibrate([30, 40, 30]);
        showBubble(0, 'Comprei tudo e nada… passo ✋', 2000);
        CORE.applyPass(st, 0);
        renderAll();
        setTimeout(localTick, 700);
      });
    }, 400);
  }
}

function shuffleFX(){
  SND.shuffle();
  if (reduceMotion) return;
  const b = $('#board'); if (!b) return;
  const w = document.createElement('div'); w.className = 'shufwrap';
  for (let i = 0; i < 9; i++) {
    const s = document.createElement('div'); s.className = 'shuf';
    s.style.setProperty('--dx', rnd(-72, 72) + 'px');
    s.style.setProperty('--dy', rnd(-48, 48) + 'px');
    s.style.setProperty('--rr', rnd(-260, 260) + 'deg');
    s.style.animationDelay = (i * 26) + 'ms';
    w.appendChild(s);
  }
  b.appendChild(w);
  setTimeout(() => w.remove(), 1000);
}

function spawnDrift(){
  if (reduceMotion || document.hidden) return;
  const game = $('#game');
  if (!game || game.classList.contains('hidden')) return;
  const set = DRIFTS[curTheme.id]; if (!set || !set.length) return;
  const mk = pick(set);
  const b = $('#board'); if (!b) return;
  const d = document.createElement('div');
  d.className = 'drift';
  d.style.setProperty('--y', rnd(10, 62) + '%');
  d.style.setProperty('--dur', rnd(9, 16) + 's');
  d.style.setProperty('--rot', rnd(-35, 35) + 'deg');

  d.innerHTML = mk();

function startLocal(cfg){
  hideSaiBar(); hidePassBar(); LOCAL.pick = false;
  view.online = false; view.mySeat = 0; view.hostSeat = 0;
  view.cfg = cfg; view.phase = 'play';
  const n = cfg.n || 4;
  const used = new Set([myAv]);
  // sorteio girando por sessão: as 8 personas revezam de verdade
  const querN = n === 2 ? 1 : 3;
  const todos = AVATARS.map(a => a.id);
  const avs = [];
  let guard = 24;
  while (avs.length < querN && guard--) {
    const id = pickFresh('mesa:avs', todos);
    if (!used.has(id)) { used.add(id); avs.push(id); }
  }
  while (avs.length < querN) {                     // segurança: completa com o que sobrar
    const id = todos.find(x => !used.has(x)); used.add(id); avs.push(id);
  }
  view.seats = [{ name: myName || 'Você', av: myAv }];
  avs.forEach(av => view.seats.push({ name: botName(av), av, bot: true }));
  LOCAL.on = true;
  LOCAL.m = CORE.newMatch(cfg.target || 6, cfg.burro); view.m = LOCAL.m;
  onHumanPlay = localHumanPlay; onHumanBuy = localHumanBuy; onBotTake = null;
  showScreen('game'); wakeLock();
  localDeal();
}

function localDeal(){
  selected = null; busy = false;
  view.st = CORE.newRound(LOCAL.m, view.cfg);

}

async function localTick(){
  if (!LOCAL.on) return;
  if (window.__PICKME) return;                    // esperando o "sai tu ou saio eu"
  const st = view.st;
  if (st.finished) return localFinish();

  if (st.turn === 0) {                                   // minha vez
    busy = false; renderAll();
    if (!legal.length) {
      if (st.buy && st.dorme.length) {                   // burrinho: compra na unha
        clearTimeout(LOCAL.idle);
        return;                                          // dorme pulsa, espera o toque
      }
      clearTimeout(LOCAL.idle);
      busy = false; renderAll();
      showPassBar(() => {
        if (!LOCAL.on || view.st !== st || st.turn !== 0 || st.finished) return;
        SND.pass(); vibrate([30, 40, 30]);
        showBubble(0, 'Passo ✋', 1600);
        CORE.applyPass(st, 0);
        renderAll();
        setTimeout(localTick, 700);
      });
      LOCAL.idle = setTimeout(() => {
        if (LOCAL.on && view.st === st && st.turn === 0 && !st.finished) { SND.turn(); toast('Sua vez — é só passar!'); }
      }, 15000);
      return;
    }
    clearTimeout(LOCAL.idle);
    LOCAL.idle = setTimeout(() => {
      if (LOCAL.on && view.st === st && st.turn === 0 && !st.finished) {
        SND.turn(); toast('Sua vez!');
        const s = (st.n || 4) === 2 ? 1 : pick([1, 3]);
        const tx = CHAT.maybe(s, seatAv(s), 'waitLong');
        if (tx) showBubble(s, esc(tx));
      }
    }, 15000);
    return;                                              // espera o toque
  }

  // vez de um da casa — com calma, pensando
  busy = true; renderAll();
  const p = st.turn;
  await sleep(rnd(500, 900));
  if (!LOCAL.on || view.st !== st || st.turn !== p) return;
  showThink(p);
  const longT = chance(.18);                       // de vez em quando, pensa de verdade
  if (longT) setTimeout(() => {
    if (LOCAL.on && view.st === st && st.turn === p && !st.finished) {
      const tx = CHAT.maybe(p, seatAv(p), 'pensa');
      if (tx) {
        showBubble(p, esc(tx), 1600);
        setTimeout(() => { if (LOCAL.on && view.st === st && st.turn === p && !st.finished) showThink(p); }, 1750);
      }
    }
  }, rnd(800, 1300));
  await sleep(longT ? rnd(3400, 5800) : rnd(900, 2100));
  if (!LOCAL.on || view.st !== st || st.turn !== p) return;
  // burrinho: o robô compra na frente de todo mundo, uma por uma
  let comprou = 0;
  while (st.buy && !CORE.legalMoves(st, p).length && st.dorme.length) {
    CORE.applyBuy(st, p);
    comprou++;
    if (comprou === 3) { const tx = CHAT.maybe(p, seatAv(p), 'buyMuito'); if (tx) showBubble(p, esc(tx)); }
    SND.deal(1); renderAll();
    await sleep(rnd(320, 520));
    if (!LOCAL.on || view.st !== st || st.turn !== p) return;
  }
  hideBubble(p);
  const mv = CORE.aiChoose(st, p);
  if (!mv) {
    SND.pass();
    const tx = CHAT.maybe(p, seatAv(p), 'pass');
    showBubble(p, esc(tx || 'Passo…'), 2300);
    CORE.applyPass(st, p);
    renderAll();
  } else {
    if (st.forced && !st.line.length) {
      const tx = CHAT.maybe(p, seatAv(p), 'forced');
      if (tx) showBubble(p, esc(tx), 2000);
    }
    CORE.applyPlay(st, p, mv.tileId, mv.end);
    SND.place(); vibrate(10);
    renderAll();
    if (st.burro && !st.finished && !st.hands[p].length) {
      SND.bat();
      const pos = (st.out || []).length;
      const med = ['🥇', '🥈', '🥉'][pos - 1] || '✔';
      showBubble(p, esc(`${med} ` + (CHAT.line(seatAv(p), 'bateu') || 'Bati!')), 2400);
    } else {
      botChatterPost(p, st, mv);
      if (!st.finished && st.hands[p].length === 1 && chance(.4)) {
        const rivais = [0, 1, 2, 3].filter(s2 => s2 !== p && s2 !== 0 &&
          s2 < (st.n || 4) && (!st.burro || st.hands[s2].length) && (st.n === 2 ? false : s2 % 2 !== p % 2));
        if (rivais.length) setTimeout(() => {
          const s2 = pick(rivais);
          const tx = CHAT.maybe(s2, seatAv(s2), 'oneLeftAdv');
          if (tx) showBubble(s2, esc(tx));
        }, 900);
      }
    }
  }
  await sleep(rnd(700, 1000));
  localTick();
}

function botChatterPost(p, st, mv){
  if (st.finished) return;
  const [a, b] = mv.tileId.split('-').map(Number);
  const e = CORE.ends(st), nxt = (p + 1) % (st.n || 4);
  let tx = null;
  if (e && st.passedOn[nxt].has(e.L) && st.passedOn[nxt].has(e.R))
    tx = CHAT.maybe(p, seatAv(p), 'lock');
  else if (a === b) tx = CHAT.maybe(p, seatAv(p), 'dbl');
  else if (st.hands[p].length === 1) tx = CHAT.maybe(p, seatAv(p), 'oneLeft');
  if (tx) showBubble(p, esc(tx));
}

  clearTimeout(LOCAL.idle); busy = true;
  if (f.type === 'burro') return localFinishBurro(st, f, m);
  if (f.team != null) m.score[f.team] += f.points;
  m.nextStarter = CORE.nextStarterFrom(st);
  const myT = 0;
  if (f.type === 'batida') {
    (f.team === myT ? SND.bat : SND.slap)();
    if (f.team === myT) confetti(32);
    const bp = f.player;
    const evKind = { 'carroça': 'bateuCarroca', 'lá-e-lô': 'bateuLalo', 'cruzada': 'bateuCruzada' }[f.kind] || 'bateu';
    if (bp !== 0) { const tx = CHAT.maybe(bp, seatAv(bp), evKind) || CHAT.maybe(bp, seatAv(bp), 'bateu');
      if (tx) showBubble(bp, esc(tx)); }
    const nn = st.n || 4;
    const par = nn === 4 ? (bp + 2) % 4 : -1;
    if (par > 0) setTimeout(() => { const tx = CHAT.maybe(par, seatAv(par), 'bateuParc'); if (tx) showBubble(par, esc(tx)); }, 700);
    const opp = (nn === 4 ? [(bp + 1) % 4, (bp + 3) % 4] : [(bp + 1) % 2]).filter(x => x !== 0);
    if (opp.length) setTimeout(() => {
      const s = pick(opp);
      const ev2 = f.kind !== 'simples' ? 'advEspecial' : 'bateuAdv';
      const tx = CHAT.maybe(s, seatAv(s), ev2);
      if (tx) showBubble(s, esc(tx));
    }, 1300);
  } else {
    SND.tranca();
    const nn = st.n || 4;
    const lp = (st.turn + nn - 1) % nn;
    if (lp !== 0) { const tx = CHAT.maybe(lp, seatAv(lp), 'trancou'); if (tx) showBubble(lp, esc(tx)); }
  }
  vibrate(f.team === myT ? [40, 60, 40] : 60);
  renderAll();
  if ((m.score[0] === 5 && m.score[1] === 0) || (m.score[1] === 5 && m.score[0] === 0)) {
    const win = m.score[0] === 5 ? 0 : 1;
    const zoador = [1, 2, 3].find(s2 => s2 % 2 === win) ?? 1;
    const medroso = [1, 2, 3].find(s2 => s2 % 2 !== win);
    setTimeout(() => { const tx = CHAT.maybe(zoador, seatAv(zoador), 'capote'); if (tx) showBubble(zoador, esc(tx)); }, 500);
    if (medroso != null) setTimeout(() => { const tx = CHAT.maybe(medroso, seatAv(medroso), 'capoteMedo'); if (tx) showBubble(medroso, esc(tx)); }, 1300);
  }
  const over = m.score[0] >= m.target || m.score[1] >= m.target;
  await sleep(SEE_BOARD_MS);                        // deixa o povo ver a mesa antes do resultado
  if (!LOCAL.on) return;
  const nn = st.n || 4;
  let extra = '', btns;
  if (over) {
    btns = [{ label: 'Ver resultado', fn: () => { closeModal(); localMatchEnd(); } }];
  } else if ((f.type === 'batida' || f.type === 'tranca') && nn === 4 && f.team === 0) {
    // nossa dupla venceu (batida OU tranca): a escolha vem DEPOIS das pedras novas
    LOCAL.pick = true;
    btns = [{ label: 'Próxima mão', fn: () => { closeModal(); localDeal(); } }];
  } else {
    if (f.type === 'batida' && nn === 4 && f.team === 1 && chance(.3)) {
      // a dupla deles também conversa: às vezes o parceiro sai

function localMatchEnd(){
  const m = LOCAL.m;
  if (view.m && view.m.burro) {
    const b = m.pen.findIndex(x => x >= 4);
    const mine = b !== 0;
    bumpStats(mine);
    if (mine) { SND.win(); confetti(); } else SND.tranca();
    [1, 2, 3].filter(s => s !== b).slice(0, 2).forEach((s, i) => setTimeout(() => {
      const tx = CHAT.maybe(s, seatAv(s), 'burroZoa');
      if (tx) showBubble(s, esc(tx), 2600);

  const mine = winner === 0;
  bumpStats(mine);
  if (mine) { SND.win(); confetti(); } else SND.tranca();
  const nnF = view.st ? (view.st.n || 4) : 4;
  const botsF = nnF === 4 ? [1, 2, 3] : [1];
  const feliz = botsF.find(s => s % 2 === winner);
  const triste = botsF.find(s => s % 2 !== winner);
  if (feliz != null) setTimeout(() => { const tx = CHAT.maybe(feliz, seatAv(feliz), 'fimWin'); if (tx) showBubble(feliz, esc(tx), 2600); }, 300);
  if (triste != null) setTimeout(() => { const tx = CHAT.maybe(triste, seatAv(triste), 'fimLose'); if (tx) showBubble(triste, esc(tx), 2600); }, 900);
  showModal(
    `<h2>${mine ? ((LOCAL.m && view.st && view.st.n === 2) ? '🏆 Vitória!' : '🏆 Vitória da dupla!')
             : ((view.st && view.st.n === 2) ? seatName(1) + ' levou essa…' : 'Eles levaram essa…')}</h2>
     <p class="sub">NÓS <span class="pt">${m.score[0]}</span> × <span class="pt">${m.score[1]}</span> ELES</p>`,
    [
      { label: 'Revanche', fn: () => { closeModal(); LOCAL.m = CORE.newMatch(view.cfg.target || 6, view.cfg.burro); view.m = LOCAL.m; localDeal(); } },
      { label: 'Menu', ghost: true, fn: () => { closeModal(); leaveLocal(); } }
    ]);
}

/* ============================================================
   JOGO ONLINE — mesa por código, host dinâmico, robôs de reserva
   ============================================================ */
const ON = {
  code: null, id: null, sub: null, hb: null,
  lastSeq: -1, seen: new Set(), joinedAt: 0,
  dealTimer: null, botFor: -1, celebFor: -1, tmoFor: -1, warn: null, pauseAsk: 0, pausedPrev: false, pick: null, pickFor: -1,
  finShown: -1, endShown: false, think: null, thinkSeat: -1, idle: null
};

const netErr = tx => { $('#netStatus').textContent = tx; };

function ensureMe(){
  myName = sanitizeName($('#nameIn').value);
  if (!myName) { $('#nameIn').focus(); netErr('escreve teu nome primeiro 😉'); return null; }
  netErr('');
  return { name: myName, av: myAv };
}

async function createRoom(){
  const me = ensureMe(); if (!me) return;
  netErr('abrindo a mesa…');
  try {
    let code = genCode();
    for (let i = 0; i < 5; i++) {
      const ex = await NET.GET('rooms/' + code);
      if (!ex) break;
      code = genCode();
    }
    ON.id = store.get('dom_pid') || uid(); store.set('dom_pid', ON.id);
    await NET.PUT('rooms/' + code, {
      createdAt: now(), phase: 'wait', cfg: { per: 6, n: 4, buy: false, target: 6 },
      players: { 0: { name: me.name, av: me.av, id: ON.id, lastSeen: now() } }
    });
    netErr('');
    enterRoom(code);
  } catch (e) { netErr('sem conexão com a mesa — tenta de novo'); }
}

async function joinRoom(codeRaw){
  const me = ensureMe(); if (!me) return;
  const code = String(codeRaw || '').toUpperCase().trim();
  if (!/^[A-Z0-9]{4}$/.test(code)) return netErr('código tem 4 letras, tipo BRZ7');
  netErr('procurando a mesa…');
  try {
    const room = await NET.GET('rooms/' + code);
    if (!room) return netErr('mesa não encontrada — confere o código');
    ON.id = store.get('dom_pid') || uid(); store.set('dom_pid', ON.id);
    if (Object.values(room.players || {}).some(p => p && p.id === ON.id)) ON.id = uid();  // 2ª aba no mesmo navegador
    const pl = room.players || {};
    const cands = [];
    for (let s = 0; s < 4; s++)                                   // 1º: meu antigo lugar (mesmo nome)
      if (pl[s] && pl[s].name && pl[s].name.toLowerCase() === me.name.toLowerCase()) cands.push(s);
    for (let s = 0; s < 4; s++)                                   // 2º: vaga livre (na espera)
      if (room.phase === 'wait' && !pl[s]) cands.push(s);
    for (let s = 0; s < 4; s++)                                   // 3º: lugar de robô (jogo rolando)
      if (room.phase !== 'wait' && pl[s] && pl[s].bot && !cands.includes(s)) cands.push(s);
    if (!cands.length) return netErr(room.phase === 'wait' ? 'mesa cheia 😅' : 'jogo rolando e mesa cheia');
    let seat = -1;
    for (const s of cands) {                                      // disputa de vaga: confirma depois de gravar
      await NET.PATCH(`rooms/${code}/players/${s}`,
        { name: me.name, av: me.av, id: ON.id, bot: null, lastSeen: now() });
      const chk = await NET.GET(`rooms/${code}/players/${s}`);
      if (chk && chk.id === ON.id) { seat = s; break; }
    }
    if (seat < 0) return netErr('a mesa encheu agorinha 😅');
    netErr('');
    enterRoom(code);
  } catch (e) { netErr('sem conexão com a mesa'); }
}

function mySeatNow(rm){
  const r = rm || (ON.sub && ON.sub.get());
  if (!r || !r.players) return -1;
  for (let s = 0; s < 4; s++) { const p = r.players[s]; if (p && p.id === ON.id) return s; }
  return -1;
}
const hostSeatOf = room => {
  for (let s = 0; s < 4; s++) { const p = (room.players || {})[s]; if (p && !p.bot) return s; }
  return 0;
};

function enterRoom(code){
  ON.code = code; ON.lastSeq = -1; ON.seen = new Set(); ON.joinedAt = now();
  ON.finShown = -1; ON.endShown = false; ON.endReveal = false; clearTimeout(ON.endTimer); ON.botFor = -1; ON.celebFor = -1; ON.tmoFor = -1; ON.pauseAsk = 0; ON.pausedPrev = false; ON.pick = null; ON.pickFor = -1; hideSaiBar(); hidePassBar();
  view.online = true;
  onHumanPlay = onlineHumanPlay; onHumanBuy = onlineHumanBuy;
  onBotTake = seat => {
    NET.PATCH(`rooms/${ON.code}/players/${seat}`, { bot: true })
      .then(() => toast('O robô assumiu o lugar de ' + seatName(seat)))
      .catch(() => {});
  };
  try { history.replaceState(null, '', location.pathname + location.search + '#' + code); } catch (e) {}
  ON.sub = NET.listen('rooms/' + code, onRoom, () => {});
  ON.lastMsg = now(); ON.seatSaved = -1; ON.revived = -1;
  clearInterval(ON.hb);
  ON.hb = setInterval(() => {
    const s = mySeatNow();
    if (s >= 0) NET.PATCH(`rooms/${ON.code}/players/${s}`, { lastSeen: now() }).catch(() => {});
  }, 25000);
}

function renderPause(room){
  const pz = room.pause;
  const ov = $('#pauseOv');
  const humanos = [0, 1, 2, 3].filter(s => room.players && room.players[s] && !room.players[s].bot);

  // pedido pendente: pergunta pra quem ainda não respondeu
  if (pz && !pz.on) {
    const ok = pz.ok || {};
    if (!ok[view.mySeat] && ON.pauseAsk !== pz.ts) {
      ON.pauseAsk = pz.ts;
      showModal(`<h2>☕ Pausa?</h2><p class="sub"><b>${esc(pz.name || 'Alguém')}</b> pediu uma pausa na mesa.</p>`, [
        { label: 'Pode pausar', fn: async () => {
            closeModal();
            await NET.PATCH('rooms/' + ON.code + '/pause/ok', { [view.mySeat]: 1 }).catch(() => {});
          } },
        { label: 'Agora não', ghost: true, fn: async () => {
            closeModal();
            await NET.PATCH('rooms/' + ON.code, { pause: null }).catch(() => {});
            NET.PATCH('rooms/' + ON.code + '/chat',
              { [now() + '_' + view.mySeat]: { s: view.mySeat, t: 'Bora seguir o jogo 😄', ts: now() } }).catch(() => {});
          } }
      ]);
    }
    // todo mundo topou? o primeiro que perceber liga a pausa
    if (humanos.every(s => ok[s])) {
      NET.PATCH('rooms/' + ON.code + '/pause', { on: 1, at: now() }).catch(() => {});
    }
  }

  const pausado = !!(pz && pz.on);
  if (ov) {
    ov.classList.toggle('hidden', !pausado);
    if (pausado) $('#pauseWho').textContent = (pz.name || 'alguém') + ' pediu — todo mundo topou';
  }
  if (pausado && !ON.pausedPrev) clearIdle();
  if (!pausado && ON.pausedPrev) {
    ON.pauseAsk = 0;
    if (view.mySeat === view.hostSeat) { ON.botFor = -1; ON.tmoFor = -1; }
    if (view.st && !view.st.finished && view.st.turn === view.mySeat) armIdle();
    if (closeIfPauseModal()) {}
  }
  ON.pausedPrev = pausado;
}
function closeIfPauseModal(){
  const h = document.querySelector('#modal h2');
  if (h && h.textContent.includes('Pausa')) { closeModal(); return true; }
  return false;
}

function onRoom(room){
  ON.lastMsg = now();
  if (!ON.code) return;
  if (room === null) { toast('A mesa foi encerrada'); return leaveOnline(false); }
  const seat = mySeatNow(room);
  if (seat < 0) {
    if (room.phase === 'wait') { toast('Você saiu da mesa'); leaveOnline(false); }
    return;
  }
  view.mySeat = seat;
  if (ON.seatSaved !== seat) {
    ON.seatSaved = seat;
    try { store.set('dom_seat', JSON.stringify({ code: ON.code, seat, name: myName, av: myAv, id: ON.id, t: now() })); } catch (e) {}
  }
  const eu = (room.players || {})[seat];
  if (eu && (eu.bot || eu.away) && ON.revived !== seat) {
    ON.revived = seat;
    NET.PATCH('rooms/' + ON.code + '/players/' + seat,
      { bot: false, away: null, name: myName, av: myAv, id: ON.id }).catch(() => {});
  }
  view.cfg = Object.assign({ per: 6, n: 4, buy: false, target: 6 }, room.cfg || {});
  view.phase = room.phase;
  view.hostSeat = hostSeatOf(room);
  view.seats = [0, 1, 2, 3].map(s => {
    const p = (room.players || {})[s];
    return p ? { name: p.name, av: p.av, bot: !!p.bot,
                 stale: !p.bot && (now() - (p.lastSeen || 0) > 45000) } : null;
  });

  if (room.phase === 'wait') { showScreen('wait'); renderWait(); return; }
  showScreen('game');
  if (room.g) processG(room.g, false);
  renderPause(room);
  hostDuties(room);
  chatDiff(room.chat);
}

function processG(g, fromMe){
  if (g.seq === ON.lastSeq && !fromMe) { renderTop(); renderOpps(); return; }
  const first = ON.lastSeq < 0;
  const mine = fromMe || (g.ev && g.ev.s === view.mySeat);
  ON.lastSeq = g.seq;
  view.st = CORE.unpack(g.st);
  view.m = g.m;
  selected = null;
  busy = view.st.turn !== view.mySeat || !!view.st.finished;

  ON.pick = g.pick || null;
  window.__PICKWAIT = !!(ON.pick && ON.pick.s !== view.mySeat && !view.st.finished);
  if (!ON.pick || view.st.finished) hideSaiBar();
  if (g.ev && g.ev.k === 'deal') { closeModal(); ON.endShown = false; if (!first) { shuffleFX(); rerollAmbience(); } }
  if (g.ev && g.ev.k === 'pick' && !mine && g.ev.by >= 0 && g.ev.s !== g.ev.by) {
    SND.tap();
    showBubble(g.ev.by, 'Sai tu, parceiro 😉', 2200);
  }
  if (!first && g.ev) {
    if (g.ev.k === 'buy') SND.deal(1);
    if (g.ev.drew) SND.deal(Math.min(g.ev.drew, 4));
    if (g.ev.k === 'play' && view.st.burro && !view.st.finished &&
        view.st.hands[g.ev.s] && !view.st.hands[g.ev.s].length) {
      const pos = (view.st.out || []).length;
      const med = ['🥇', '🥈', '🥉'][pos - 1] || '✔';
      if (g.ev.s === view.mySeat) { SND.bat(); confetti(18); toast(`${med} Você bateu! Agora é só assistir`); }
      else { SND.bat(); showBubble(g.ev.s, esc(`Bati! ${med}`), 2200); }
    }
  }
  if (!mine && !first && g.ev) {
    if (g.ev.k === 'play') { SND.place(); vibrate(8); }
    else if (g.ev.k === 'pass') SND.pass();
    else if (g.ev.k === 'deal') SND.deal(view.cfg.per);
  }
  if (first && g.ev && g.ev.k === 'deal' && view.st.plays === 0) SND.deal(view.cfg.per);

  renderAll(g.ev && g.ev.k === 'deal');
  clearThink(); clearIdle();

  if (view.st.finished) {
    if (ON.finShown !== g.seq) { ON.finShown = g.seq; finishOnline(g); }
    return;
  }
  if (ON.pick && ON.pick.s === view.mySeat && ON.pickFor !== g.seq) {
    ON.pickFor = g.seq;
    const parceiro = (view.mySeat + 2) % 4;
    setTimeout(() => {
      if (!ON.pick || ON.pick.s !== view.mySeat) return;
      showSaiBar(parceiro, sel => {
        const st2 = CORE.unpack(CORE.pack(view.st));
        st2.starter = sel; st2.turn = sel;
        writeG(st2, view.m, { k: 'pick', s: sel, by: view.mySeat });
      });
    }, 600);
  }
  if (view.st.turn === view.mySeat) {
    busy = ON.pick ? true : false; renderHand();
    if (!ON.pick) {
      const lm = CORE.legalMoves(view.st, view.mySeat);
      if (!lm.length) {
        if (view.st.buy && view.st.dorme.length) { hidePassBar(); armIdle(); }   // burrinho: compra na mão
        else { busy = false; renderHand(); armIdle(); showPassBar(() => doPassOnline(g.seq)); }
      }
      else { hidePassBar(); armIdle(); }
    }
  } else {
    hidePassBar();
    ON.thinkSeat = view.st.turn;
    ON.think = setTimeout(() => showThink(ON.thinkSeat), 700);
  }
}
function clearThink(){ clearTimeout(ON.think); if (ON.thinkSeat >= 0) hideBubble(ON.thinkSeat); ON.thinkSeat = -1; }
function clearIdle(){ clearTimeout(ON.idle); clearTimeout(ON.warn); }
function armIdle(){
  clearIdle();
  ON.idle = setTimeout(() => { SND.turn(); vibrate(20); toast('Sua vez!'); }, 15000);
  const lim = (window.__TURNMS || 120000);
  ON.warn = setTimeout(() => { SND.turn(); vibrate([30, 40, 30]); toast('⏱ Meio minuto pra jogar!'); }, Math.max(1000, lim - 30000));
}

async function writeG(st2, m2, ev, extraRoot){
  const seq = ON.lastSeq + 1;
  const body = Object.assign({ g: { seq, st: CORE.pack(st2), m: m2, ev, t: now() } }, extraRoot || {});
  processG(body.g, true);                       // otimista: já mostro a minha jogada
  try { await NET.PATCH('rooms/' + ON.code, body); }
  catch (e) {
    toast('A conexão falhou — sincronizando…');
    const fresh = await NET.GET('rooms/' + ON.code).catch(() => null);
    if (fresh) { ON.lastSeq = -1; onRoom(fresh); }
  }
}

function finPatch(st2, m2){
  const f = st2.finished, extra = {};
  if (!f) return extra;
  if (f.type === 'burro') {
    m2.pen = [...(m2.pen || [0, 0, 0, 0])];
    m2.pen[f.burro]++;
    m2.nextStarter = f.burro;
    if (m2.pen[f.burro] >= 4) extra.phase = 'end';   // mão chegaria a 8: coroou o BURRO
    return extra;
  }
  if (f.team != null) m2.score[f.team] += f.points;
  m2.nextStarter = CORE.nextStarterFrom(st2);
  if (m2.score[0] >= m2.target || m2.score[1] >= m2.target) extra.phase = 'end';
  return extra;
}

function onlineHumanPlay(tileId, end){
  const st = view.st;
  if (!view.online || st.turn !== view.mySeat || busy || st.finished) return;
  clearIdle();
  busy = true; selected = null;
  const st2 = CORE.unpack(CORE.pack(st));
  try { CORE.applyPlay(st2, view.mySeat, tileId, end); } catch (e) { busy = false; return; }
  SND.place(); vibrate(12);
  const m2 = { ...view.m, score: [...view.m.score] };
  const extra = finPatch(st2, m2);
  if (st2.finished && st2.finished.type === 'batida') {
    const key = now() + '_' + view.mySeat;
    extra['chat/' + key] = { s: view.mySeat, t: pick(FR.generic.bateu), ts: now() };
  }
  writeG(st2, m2, { k: 'play', s: view.mySeat }, extra);
}

async function onlineHumanBuy(){
  const cur = ON.sub && ON.sub.get();
  if (!cur || !cur.g) return;
  const st = view.st;
  if (busy || !st || st.finished || st.turn !== view.mySeat) return;
  if (!st.buy || CORE.legalMoves(st, view.mySeat).length || !st.dorme.length) return;
  busy = true;
  const st2 = CORE.unpack(CORE.pack(st));
  CORE.applyBuy(st2, view.mySeat);
  const m2 = { ...view.m, score: [...view.m.score] };
  writeG(st2, m2, { k: 'buy', s: view.mySeat });
}

function doPassOnline(seq){
  const cur = ON.sub && ON.sub.get();
  if (!cur || !cur.g || cur.g.seq !== seq) return;
  const st = view.st;
  if (st.turn !== view.mySeat || st.finished) return;
  SND.pass(); vibrate([30, 40, 30]);
  const st2 = CORE.unpack(CORE.pack(st));
  CORE.applyPass(st2, view.mySeat);
  const m2 = { ...view.m, score: [...view.m.score] };
  const extra = finPatch(st2, m2);
  const key = now() + '_' + view.mySeat;
  extra['chat/' + key] = { s: view.mySeat, t: pick(['Toc-toc… passo', 'Passo!', 'Sem pedra 😩']), ts: now() };
  writeG(st2, m2, { k: 'pass', s: view.mySeat }, extra);
}

/* --- deveres do dono da mesa (menor assento humano) --- */
async function resyncOnline(){
  if (!ON.code) return;
  try { ON.sub && ON.sub.close && ON.sub.close(); } catch (e) {}
  let room = null;
  try { room = await NET.GET('rooms/' + ON.code); } catch (e) {}
  if (!room) { toast('A mesa não existe mais'); leaveOnline(false); return; }
  const meu = (room.players || {})[view.mySeat];
  if (meu && (meu.bot || meu.away)) {
    NET.PATCH('rooms/' + ON.code + '/players/' + view.mySeat,
      { bot: false, away: null, name: myName, av: myAv, id: ON.id }).catch(() => {});
  }
  ON.sub = NET.listen('rooms/' + ON.code, onRoom, () => {});
  ON.lastMsg = now();
  onRoom(room);
}
window.addEventListener('pageshow', () => { if (ON.code) resyncOnline(); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ON.code) resyncOnline();
});
setInterval(() => {                                   // cão de guarda: SSE mudo há 20s? re-sincroniza
  if (document.visibilityState !== 'visible' || !ON.code) return;
  if (view.paused) return;
  if (now() - (ON.lastMsg || 0) > 20000) resyncOnline();
}, 8000);

function hostDuties(room){
  if (view.mySeat !== view.hostSeat) return;
  if (room.pause && room.pause.on) {
    // pausa esquecida some sozinha em 5 min
    if (now() - (room.pause.at || now()) > 300000) doResume();
    return;
  }
  if (room.phase === 'play' && !room.g) { dealOnline(false); return; }
  if (!room.g) return;
  const g = room.g, st = view.st;

  if (st && st.finished) {
    if (ON.celebFor !== g.seq) { ON.celebFor = g.seq; botsCelebrate(st); }
    if (room.phase !== 'end' && !ON.dealTimer) {
      ON.dealTimer = setTimeout(() => { ON.dealTimer = null; dealOnline(false); }, NEXT_DEAL_MS);
    }
    return;
  }
  clearTimeout(ON.dealTimer); ON.dealTimer = null;

  const ps = room.players || {};
  for (const k in ps) {
    const pl = ps[k];
    if (pl && !pl.bot && pl.away && now() - pl.away > 90000) {
      NET.PATCH('rooms/' + ON.code + '/players/' + k, { bot: true, away: null }).catch(() => {});
    }
  }
  if (g.pick) {
    if (now() - (g.t || 0) > 45000) {              // decisor sumiu: mantém quem bateu e segue
      const st2 = CORE.unpack(g.st);
      writeG(st2, g.m, { k: 'pick', s: st2.turn, by: -1 });
    }
    return;
  }

  const p = st ? st.turn : -1;
  const pl = (room.players || {})[p];
  if (p >= 0 && pl && pl.bot && ON.botFor !== g.seq) {
    ON.botFor = g.seq;
    const longT = chance(.16);
    if (longT) setTimeout(() => {
      const cur = ON.sub && ON.sub.get();
      if (!cur || !cur.g || cur.g.seq !== g.seq) return;
      const tx = CHAT.maybe(p, seatAv(p), 'pensa');
      if (tx) NET.PATCH('rooms/' + ON.code + '/chat',
        { [now() + '_' + p]: { s: p, t: tx, ts: now() } }).catch(() => {});
    }, rnd(900, 1400));
    setTimeout(() => botMove(g.seq, p), longT ? rnd(3800, 6200) : rnd(1500, 3000));
  }
  // relógio da mesa: humano tem 2 min pra jogar, depois a mesa joga por ele
  if (p >= 0 && pl && !pl.bot && ON.tmoFor !== g.seq) {
    ON.tmoFor = g.seq;
    const lim = (window.__TURNMS || 120000);
    const wait = Math.max(800, lim - (now() - (g.t || now())));
    setTimeout(() => hostTimeout(g.seq, p), wait);
  }
}

async function hostTimeout(seq, p){
  const cur = ON.sub && ON.sub.get();
  if (!cur || !cur.g || cur.g.seq !== seq || view.mySeat !== view.hostSeat) return;
  if (cur.pause) { ON.tmoFor = -1; return; }
  if (cur.phase !== 'play') return;
  const pl = (cur.players || {})[p];
  if (!pl || pl.bot) return;
  const st2 = CORE.unpack(cur.g.st);
  if (st2.turn !== p || st2.finished) return;
  const m2 = { ...cur.g.m, score: [...cur.g.m.score] };
  let drew = 0;
  while (st2.buy && !CORE.legalMoves(st2, p).length && st2.dorme.length) { CORE.applyBuy(st2, p); drew++; }
  const mv = CORE.aiChoose(st2, p);
  const extra = { ['chat/' + now() + '_' + p]: { s: p, t: '⏱ o tempo acabou — a mesa jogou por mim', ts: now() } };
  let ev;
  if (mv) { CORE.applyPlay(st2, p, mv.tileId, mv.end); ev = { k: 'play', s: p }; }
  else    { CORE.applyPass(st2, p);                    ev = { k: 'pass', s: p }; }
  if (drew) ev.drew = drew;
  Object.assign(extra, finPatch(st2, m2));
  writeG(st2, m2, ev, extra);
}

async function botMove(seq, p){
  const cur = ON.sub && ON.sub.get();
  if (!cur || !cur.g || cur.g.seq !== seq || view.mySeat !== view.hostSeat) return;
  if (cur.pause) { ON.botFor = -1; return; }
  const st2 = CORE.unpack(cur.g.st);
  if (st2.turn !== p || st2.finished) return;
  const m2 = { ...cur.g.m, score: [...cur.g.m.score] };
  let drew = 0;
  while (st2.buy && !CORE.legalMoves(st2, p).length && st2.dorme.length) { CORE.applyBuy(st2, p); drew++; }
  const mv = CORE.aiChoose(st2, p);
  const extra = {};
  const say = (ev) => {
    const tx = CHAT.maybe(p, seatAv(p), ev);
    if (tx) extra['chat/' + (now()) + '_' + p] = { s: p, t: tx, ts: now() };
  };
  if (!mv) {
    CORE.applyPass(st2, p);
    say('pass');
    Object.assign(extra, finPatch(st2, m2));
    const evp = { k: 'pass', s: p }; if (drew) evp.drew = drew;
    writeG(st2, m2, evp, extra);
    return;
  }
  if (st2.forced && !st2.line.length) say('forced');
  CORE.applyPlay(st2, p, mv.tileId, mv.end);
  if (!st2.finished) {
    const [a, b] = mv.tileId.split('-').map(Number);
    const e = CORE.ends(st2), nxt = (p + 1) % (st2.n || 4);
    if (e && st2.passedOn[nxt].has(e.L) && st2.passedOn[nxt].has(e.R)) say('lock');
    else if (a === b) say('dbl');
    else if (st2.hands[p].length === 1) say('oneLeft');
  }
  Object.assign(extra, finPatch(st2, m2));
  writeG(st2, m2, (drew ? { k: 'play', s: p, drew } : { k: 'play', s: p }), extra);
}

function botsCelebrate(st){
  const f = st.finished, entries = {};
  let t = now();
  const isBot = s => view.seats[s] && view.seats[s].bot;
  const add = (s, ev) => {
    const tx = CHAT.maybe(s, seatAv(s), ev);
    if (tx) entries[(t++) + '_' + s] = { s, t: tx, ts: now() };
  };
  if (f.type === 'batida') {
    if (isBot(f.player)) add(f.player, 'bateu');
    const nn = st.n || 4;
    const par = nn === 4 ? (f.player + 2) % 4 : -1;
    if (par >= 0 && isBot(par)) add(par, 'bateuParc');
    const opp = (nn === 4 ? [(f.player + 1) % 4, (f.player + 3) % 4] : [(f.player + 1) % 2]).filter(isBot);
    if (opp.length) add(pick(opp), 'bateuAdv');
  } else {
    const nn = st.n || 4;
    const lp = (st.turn + nn - 1) % nn;
    if (isBot(lp)) add(lp, 'trancou');
  }
  if (Object.keys(entries).length)
    NET.PATCH('rooms/' + ON.code + '/chat', entries).catch(() => {});
}

async function dealOnline(freshMatch){
  if (view.mySeat !== view.hostSeat || !ON.code) return;
  const room = ON.sub && ON.sub.get();
  const base = room && room.g ? room.g : null;
  const m = (!freshMatch && base)
    ? { ...base.m, score: [...base.m.score] }
    : CORE.newMatch((view.cfg && view.cfg.target) || 6);
  const st = CORE.newRound(m, view.cfg);
  let pickSeat = null;
  if (!freshMatch && base && base.st) {
    const pst = CORE.unpack(base.st);
    const f = pst.finished;
    if (f && f.team != null && (pst.n || 4) === 4 &&
        (f.type === 'batida' || f.type === 'tranca')) {
      const isBot = s => { const pl = (room.players || {})[s]; return pl && pl.bot; };
      if (f.type === 'batida') {
        const bt = f.player, pr = (bt + 2) % 4;
        if (!isBot(bt)) pickSeat = bt;
        else if (!isBot(pr)) pickSeat = pr;
        else if (chance(.3)) { st.starter = pr; st.turn = pr; }   // dupla toda robô resolve sozinha
      } else {
        const a = f.team, b2 = f.team + 2;                        // tranca: humano da dupla decide
        if (!isBot(a)) pickSeat = a;
        else if (!isBot(b2)) pickSeat = b2;
      }
    }
  }
  const seq = (base ? base.seq : 0) + 1;
  ON.finShown = -1;
  await NET.PATCH('rooms/' + ON.code, {
    phase: 'play', chat: null,
    g: { seq, st: CORE.pack(st), m, ev: { k: 'deal', s: view.mySeat }, t: now(),
         pick: pickSeat != null ? { s: pickSeat } : null }
  }).catch(() => toast('Não consegui embaralhar — tenta de novo'));
}

async function finishOnline(g){
  const st = view.st, f = st.finished, myT = TEAM_OF(view.mySeat);
  clearIdle(); clearThink();
  if (f.type === 'burro') return finishBurroOnline(g, st, f);
  if (f.type === 'batida') {
    (f.team === myT ? SND.bat : SND.slap)();
    if (f.team === myT) confetti(32);
  }
  else SND.tranca();
  vibrate(f.team === myT ? [40, 60, 40] : 60);
  renderAll();
  await sleep(SEE_BOARD_MS);
  const cur = ON.sub && ON.sub.get();
  if (!cur || !ON.code) return;
  if (cur.phase === 'end') return matchEndOnline();
  if (cur.g && cur.g.seq !== g.seq) return;              // a próxima mão já chegou
  const host = view.mySeat === view.hostSeat;
  const btns = host
    ? [{ label: 'Dar as pedras agora', fn: () => { closeModal(); clearTimeout(ON.dealTimer); ON.dealTimer = null; dealOnline(false); } }]
    : [{ label: 'Beleza', ghost: true, fn: closeModal }];
  let corpo;
  try { corpo = revealHTML(); }
  catch (e) { corpo = `<h2>Fim da mão</h2><p class="sub">placar atualizado</p>`; }
  const m = showModal(corpo + `<p class="sub" id="nextIn"></p>`, btns);
  let s = NEXT_CNT;
  const iv = setInterval(() => {
    const el = document.getElementById('nextIn');
    if (!el) return clearInterval(iv);
    s--;
    el.textContent = s > 0 ? `a próxima mão vem em ${s}s ⏳` : 'embaralhando…';
    if (s <= 0) clearInterval(iv);
  }, 1000);
  const el0 = document.getElementById('nextIn');
  if (el0) el0.textContent = `a próxima mão vem em ${NEXT_CNT}s ⏳`;
}

async function finishBurroOnline(g, st, f){
  const souEu = f.burro === view.mySeat;
  if (souEu) { SND.tranca(); vibrate(80); }
  else { SND.slap(); confetti(20); }
  renderAll();
  await sleep(SEE_BOARD_MS);
  const cur = ON.sub && ON.sub.get();
  if (!cur || !ON.code) return;
  if (cur.phase === 'end') return matchEndOnline();
  if (cur.g && cur.g.seq !== g.seq) return;
  const host = view.mySeat === view.hostSeat;
  let corpo;
  try { corpo = revealHTML(); } catch (e) { corpo = `<h2>Fim da rodada</h2>`; }
  showModal(corpo + `<p class="sub" id="nextIn"></p>`, host
    ? [{ label: 'Próxima rodada', fn: () => { closeModal(); clearTimeout(ON.dealTimer); ON.dealTimer = null; dealOnline(false); } }]
    : [{ label: 'Beleza', ghost: true, fn: closeModal }]);
  let s = NEXT_CNT;
  const iv = setInterval(() => {
    const el = document.getElementById('nextIn');
    if (!el) return clearInterval(iv);
    s--;
    el.textContent = s > 0 ? `a próxima rodada vem em ${s}s ⏳` : 'embaralhando…';
    if (s <= 0) clearInterval(iv);
  }, 1000);
  const el0 = document.getElementById('nextIn');
  if (el0) el0.textContent = `a próxima rodada vem em ${NEXT_CNT}s ⏳`;
}

function matchEndOnline(){
  if (ON.endShown) return;
  if (!ON.endReveal) {
    ON.endReveal = true;
    let corpo = '';
    try { corpo = revealHTML(); } catch (e) { corpo = ''; }
    if (corpo) {
      showModal(corpo + `<p class="sub">🏁 fim de partida! preparando o placar…</p>`, []);
      clearTimeout(ON.endTimer);
      ON.endTimer = setTimeout(() => { closeModal(); matchEndOnline(); }, 5200);
      return;
    }
  }
  ON.endShown = true;
  const m = view.m, myT = TEAM_OF(view.mySeat);
  if (view.cfg && view.cfg.burro) {
    const b = (m.pen || []).findIndex(x => x >= 4);
    const mine = b !== view.mySeat;
    bumpStats(mine);
    if (mine) { SND.win(); confetti(); } else SND.tranca();
    const host = view.mySeat === view.hostSeat;
    return showModal(
      `<h2>${b === view.mySeat ? '🐴 Você é o BURRO!' : '🐴 ' + esc(seatName(b)) + ' é o BURRO!'}</h2>
       <p class="sub">${b === view.mySeat ? 'a mão ia chegar a 8 pedras… acontece 🫠' : 'levou 4 castigos — a mesa agradece 😄'}</p>`,
      host
        ? [{ label: '🔁 Revanche', fn: () => { closeModal(); dealOnline(true); } },
           { label: 'Encerrar a mesa', ghost: true, fn: () => { closeModal(); leaveOnline(true); } }]
        : [{ label: 'Beleza', ghost: true, fn: closeModal }]);
  }
  const winner = m.score[0] >= m.target ? 0 : 1;
  const mine = winner === myT;
  bumpStats(mine);
  if (mine) { SND.win(); confetti(); } else SND.tranca();
  const host = view.mySeat === view.hostSeat;
  const btns = host
    ? [{ label: 'Revanche', fn: () => { closeModal(); dealOnline(true); } },
       { label: 'Encerrar mesa', ghost: true, fn: () => { NET.DEL('rooms/' + ON.code).catch(() => {}); } }]
    : [{ label: 'Sair da mesa', ghost: true, fn: () => leaveOnline(true) }];
  showModal(
    `<h2>${mine ? ((LOCAL.m && view.st && view.st.n === 2) ? '🏆 Vitória!' : '🏆 Vitória da dupla!')
             : ((view.st && view.st.n === 2) ? seatName(1) + ' levou essa…' : 'Eles levaram essa…')}</h2>
     <p class="sub">NÓS <span class="pt">${m.score[myT]}</span> × <span class="pt">${m.score[1 - myT]}</span> ELES</p>
     ${host ? '' : '<p class="sub" style="font-size:13px;color:var(--muted)">o dono da mesa decide a revanche…</p>'}`,
    btns);
}

/* chat/reações vindas da mesa */
function chatDiff(chat){
  if (!chat) return;
  const keys = Object.keys(chat).sort();
  for (const k of keys) {
    if (ON.seen.has(k)) continue;
    ON.seen.add(k);
    const e = chat[k];
    if (!e || e.s == null) continue;
    if ((e.ts || 0) < ON.joinedAt - 3000) continue;
    if (e.s !== view.mySeat) chatBubble(e.s, e);
    // dono da mesa: às vezes um da casa responde a provocação humana
    const humanEntry = view.seats[e.s] && !view.seats[e.s].bot;
    if (humanEntry && view.mySeat === view.hostSeat && chance(.35)) {
      const bots = [0, 1, 2, 3].filter(s => view.seats[s] && view.seats[s].bot);
      if (bots.length) {
        const b = pick(bots);
        setTimeout(() => {
          const tx = CHAT.maybe(b, seatAv(b), 'reply');
          if (tx) NET.PATCH('rooms/' + ON.code + '/chat',
            { [now() + '_' + b]: { s: b, t: tx, ts: now() } }).catch(() => {});
        }, rnd(1200, 2600));
      }
    }
  }
}

/* --- sala de espera --- */
function renderWait(){
  $('#codeShow').textContent = ON.code || '····';
  const host = view.mySeat === view.hostSeat;
  const n = view.cfg.n || 4;
  const bm = $('#btnMode');
  if (bm) { bm.textContent = modeLabel(view.cfg); bm.disabled = !host; }
  const tt = document.querySelector('.teamtags');
  if (tt) tt.style.display = view.cfg.burro ? 'none' : '';
  const grid = $('#seatGrid'); grid.innerHTML = '';
  grid.classList.toggle('n2', n === 2);
  for (let s = 0; s < n; s++) {
    const p = view.seats[s];
    const d = document.createElement('div');
    d.className = 'seat t' + TEAM_OF(s) + (p ? '' : ' empty');
    d.innerHTML = p
      ? `<div class="sav">${avSVG(p.av)}</div>
         <div class="sinfo"><div class="sname">${esc(p.name)}${p.bot ? ' 🤖' : ''}${s === view.mySeat ? ' (você)' : ''}</div>
         <div class="srole">${s === view.hostSeat ? 'dono da mesa' : (p.bot ? 'robô da casa' : 'na mesa')}</div></div>
         ${s === view.hostSeat ? '<span class="hostStar">⭐</span>' : ''}`
      : `<div class="sav" style="opacity:.35">${avSVG('nino')}</div>
         <div class="sinfo"><div class="sname">vaga aberta</div><div class="srole">toque pra sentar aqui · robô se ninguém vier</div></div>`;
    if (!p) { d.style.cursor = 'pointer'; d.onclick = () => moveSeat(s); }
    grid.appendChild(d);
  }
  const nHum = view.seats.filter(p => p && !p.bot).length;
  $('#waitMsg').innerHTML = host
    ? (view.cfg.burro ? '🐴 No Burrinho é todos por si! Manda o código — pode começar que vaga vira robô.'
       : n === 2 ? 'É mano a mano — manda o código pro rival. Pode começar que vaga vira robô.'
                 : 'Manda o código pra galera. Dupla é quem senta de frente — pode começar que vaga vira robô.')
    : `Esperando <b>${esc(seatName(view.hostSeat))}</b> dar as pedras… (${nHum}/${n} na mesa)`;
  $('#btnStart').classList.toggle('hidden', !host);
  $('#btnSwap').classList.toggle('hidden', !host || n === 2);
}

async function moveSeat(s){
  const room = ON.sub && ON.sub.get();
  if (!room || room.phase !== 'wait' || (room.players || {})[s]) return;
  const old = mySeatNow();
  if (old < 0 || old === s) return;
  if (old === view.hostSeat) {
    const nn = (room.cfg && room.cfg.n) || 4;
    const outros = [...Array(nn).keys()].filter(x => x !== old && room.players[x] && !room.players[x].bot);
    if (outros.some(x => x < s)) return toast('O dono fica no menor assento — usa "Girar lugares"');
  }
  SND.tap();
  const me = { ...room.players[old], lastSeen: now() };
  try {
    await NET.PATCH('rooms/' + ON.code + '/players', { [s]: me, [old]: null });
    const chk = await NET.GET(`rooms/${ON.code}/players/${s}`);
    if (!chk || chk.id !== ON.id) toast('Esse lugar foi ocupado agorinha 😅');
  } catch (e) {}
}

async function startOnline(){
  const room = ON.sub && ON.sub.get();
  if (!room) return;
  const used = new Set(Object.values(room.players || {}).map(p => p && p.av).filter(Boolean));
  const pool = ['zefa', 'beto', 'tiao', 'nino', 'rosinha', 'loro', 'caramelo', 'neno'].filter(a => !used.has(a));
  const patch = {};
  for (let s = 0; s < 4; s++) {
    if (!(room.players || {})[s]) {
      const av = pool.shift() || 'nino';
      patch['players/' + s] = { name: botName(av), av, bot: true, id: 'bot' + s, lastSeen: now() };
    }
  }
  const m = CORE.newMatch((view.cfg && view.cfg.target) || 6);
  const st = CORE.newRound(m, view.cfg);
  patch.phase = 'play'; patch.chat = null;
  patch.g = { seq: 1, st: CORE.pack(st), m, ev: { k: 'deal', s: view.mySeat }, t: now() };
  await NET.PATCH('rooms/' + ON.code, patch).catch(() => toast('Falhou — tenta de novo'));
}

function hostModePick(){
  modeMenu(async cfg => {
    const room = ON.sub && ON.sub.get();
    if (!room || room.phase !== 'wait') return;
    const humans = Object.entries(room.players || {}).filter(([, p]) => p && !p.bot);
    if (cfg.n === 2 && humans.length > 2)
      return toast('1x1 é só com 2 na mesa — alguém sai primeiro 😄');
    if (cfg.n === 2) {
      const seats = humans.map(([s]) => +s).sort((a, b) => a - b);
      const patch = {};
      seats.forEach((s, i) => { if (s !== i) { patch[i] = room.players[s]; patch[s] = null; } });
      [2, 3].forEach(s => { if (room.players[s] && !(s in patch)) patch[s] = null; });
      if (Object.keys(patch).length)
        await NET.PATCH('rooms/' + ON.code + '/players', patch).catch(() => {});
    }
    NET.PATCH('rooms/' + ON.code + '/cfg', { per: cfg.per, n: cfg.n, buy: !!cfg.buy, burro: !!cfg.burro }).catch(() => {});
  });
}

async function swapSeats(){
  const room = ON.sub && ON.sub.get();
  if (!room || view.mySeat !== view.hostSeat) return;
  const pl = room.players || {};
  await NET.PATCH('rooms/' + ON.code + '/players', {
    1: pl[3] || null, 2: pl[1] || null, 3: pl[2] || null
  }).catch(() => {});
}

async function leaveOnline(write){
  const code = ON.code, seat = mySeatNow();
  ON.code = null;
  clearInterval(ON.hb);
  clearTimeout(ON.dealTimer); ON.dealTimer = null;
  clearThink(); clearIdle();
  if (ON.sub) { ON.sub.close(); ON.sub = null; }
  if (write && code && seat >= 0) {
    try {
      if (view.phase === 'wait') await NET.DEL(`rooms/${code}/players/${seat}`);
      else await NET.PATCH(`rooms/${code}/players/${seat}`, { bot: true });
    } catch (e) {}
  }
  try { history.replaceState(null, '', location.pathname + location.search); } catch (e) {}
  view.online = false;
  closeModal();
  statsLine();
  showScreen('menu');
}

/* se fechar a aba no meio do jogo, o robô assume o lugar */
window.addEventListener('pagehide', () => {
  const seat = mySeatNow();
  if (!ON.code || seat < 0) return;
  const base = `${DB}${ROOT ? '/' + ROOT : ''}/rooms/${ON.code}/players/${seat}.json`;
  try {
    if (view.phase === 'wait') fetch(base, { method: 'DELETE', keepalive: true });
    else fetch(base, { method: 'PATCH', body: JSON.stringify({ away: now() }), keepalive: true });
  } catch (e) {}
});

/* ============================================================
   REAÇÕES DO JOGADOR
   ============================================================ */
function buildPal(){
  const p = $('#reactPal');
  p.innerHTML =
    `<div class="emos">${REACT_EMO.map(e => `<button class="emo">${e}</button>`).join('')}</div>
     <div class="frs">${REACT_FRA.map(f => `<button class="fr">${esc(f)}</button>`).join('')}</div>`;
  p.querySelectorAll('.emo').forEach(b => b.onclick = () => sendReact({ e: b.textContent }));
  p.querySelectorAll('.fr').forEach(b => b.onclick = () => sendReact({ t: b.textContent }));
}
function hidePal(){ $('#reactPal').classList.add('hidden'); }
function sendReact(r){
  hidePal(); SND.tap(); vibrate(8);
  const entry = { s: view.mySeat, ts: now(), ...(r.e ? { e: r.e } : { t: r.t }) };
  chatBubble(view.mySeat, entry);
  if (view.online && ON.code) {
    const key = now() + '_' + view.mySeat;
    ON.seen.add(key);
    NET.PATCH('rooms/' + ON.code + '/chat', { [key]: entry }).catch(() => {});
  } else if (LOCAL.on && chance(.45)) {
    const s = pick([1, 2, 3]);
    setTimeout(() => {
      const tx = CHAT.maybe(s, seatAv(s), 'reply');
      if (tx) showBubble(s, esc(tx));
    }, rnd(1200, 2400));
  }
}

/* ============================================================
   MENU / BOOT
   ============================================================ */
let wl = null;
async function wakeLock(){
  try { wl = await navigator.wakeLock.request('screen'); } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !$('#game').classList.contains('hidden')) wakeLock();
});

function gameMenu(){
  const inGame = LOCAL.on || (view.online && ON.code);
  showModal(`<h2>Mesa</h2>`, [
    { label: 'Como funciona', ghost: true, fn: () => showModal(rulesHTML(view.cfg), [{ label: 'Fechei', fn: closeModal }]) },
    { label: 'Som: ' + (soundOn ? 'ligado 🔊' : 'mudo 🔇'), ghost: true, fn: () => { soundOn = !soundOn; closeModal(); gameMenu(); } },
    { label: '💡 Dicas: ' + (hintsOn ? 'ligadas' : 'desligadas'), ghost: true, fn: () => {
        hintsOn = !hintsOn; store.set('dom_hints', hintsOn ? '1' : '0');
        if (view.st) renderHand();
        closeModal(); gameMenu();
      } },
    { label: '🎨 Personalizar', ghost: true, fn: () => { closeModal(); customize(); } },
    ...(view.online && ON.code && view.phase === 'play' ? [{
      label: '⏸️ Pedir pausa', ghost: true, fn: () => { closeModal(); requestPause(); }
    }] : []),
    ...(inGame ? [{
      label: 'Sair da mesa', ghost: true, fn: () => {
        closeModal();
        if (view.online) leaveOnline(true); else leaveLocal();
      }
    }] : []),
    { label: 'Voltar ao jogo', fn: closeModal }
  ]);
}

function inviteText(){
  const link = location.href.split('#')[0] + '#' + ON.code;
  return `Bora um dominó? 🁢 Mesa *${ON.code}* → ${link}`;
}

function boot(){
  applyTheme(initialTheme());
  applySkin(initialSkin());
  hintsOn = store.get('dom_hints') !== '0';
  try {
    const rawSeat = store.get('dom_seat');
    if (rawSeat) {
      const ds = JSON.parse(rawSeat);
      if (ds && ds.code && now() - (ds.t || 0) < 3 * 3600e3) {
        NET.GET('rooms/' + ds.code).then(room => {
          if (!room || room.phase === 'end' || !(room.players || {})[ds.seat]) { store.set('dom_seat', ''); return; }
          showModal(`<h2>Voltar pra mesa?</h2>
            <p class="sub">Você estava na mesa <b>${esc(ds.code)}</b> — dá pra retomar seu lugar.</p>`,
            [{ label: '🔄 Voltar pra mesa', fn: () => {
                closeModal();
                myName = ds.name || myName; myAv = ds.av || myAv;
                if (ds.id) { ON.id = ds.id; store.set('dom_pid', ds.id); }
                enterRoom(ds.code);
              } },
             { label: 'Agora não', ghost: true, fn: () => { store.set('dom_seat', ''); closeModal(); } }]);
        }).catch(() => {});
      }
    }
  } catch (e) {}
  applySize(initialSize(), false);
  // pedras decorativas do menu
  const mt = $('#menuTiles');
  [[6, 6], [2, 5], [4, 1]].forEach(([a, b]) => {
    const d = document.createElement('div');
    d.className = 'mt';
    d.innerHTML = halfHTML(a) + halfHTML(b) + '<span class="mid"></span>';
    mt.appendChild(d);
  });
  // escolha de avatar
  const row = $('#avRow');
  AVATARS.forEach(a => {
    const b = document.createElement('button');
    b.className = 'avpick'; b.dataset.av = a.id; b.title = a.n;
    b.innerHTML = avSVG(a.id);
    b.onclick = () => {
      SND.tap(); myAv = a.id; store.set('dom_av', myAv);
      row.querySelectorAll('.avpick').forEach(x => x.classList.toggle('on', x.dataset.av === myAv));
    };
    row.appendChild(b);
  });
  const savedAv = store.get('dom_av');
  myAv = AVATARS.some(a => a.id === savedAv) ? savedAv : 'caramelo';
  row.querySelector('[data-av="' + myAv + '"]').classList.add('on');
  const savedName = store.get('dom_name');
  if (savedName) $('#nameIn').value = savedName;
  $('#nameIn').addEventListener('change', () => store.set('dom_name', sanitizeName($('#nameIn').value)));
  $('#btnTheme').onclick = () => { SND.tap(); customize(); };
  statsLine();

  buildPal();

  $('#btnLocal').onclick = () => {
    SND.unlock(); SND.tap();
    myName = sanitizeName($('#nameIn').value) || 'Você';
    modeMenu(cfg => startLocal(cfg));
  };
  $('#btnCreate').onclick = () => { SND.unlock(); SND.tap(); createRoom(); };
  $('#btnJoinShow').onclick = () => {
    SND.tap();
    $('#joinBox').classList.toggle('hidden');
    $('#codeIn').focus();
  };
  $('#btnRules').onclick = () => { SND.tap(); showModal(rulesHTML(null), [{ label: 'Fechei', fn: closeModal }]); };
  // ---- instalar como app (PWA) ----
  const isStandalone = () => matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  const isiOS = () => /iphone|ipad|ipod/i.test(navigator.userAgent);
  const btnInstall = $('#btnInstall');
  if (btnInstall && !isStandalone()) btnInstall.classList.remove('hidden');   // mostra p/ iOS e Android
  window.addEventListener('beforeinstallprompt', e => {                        // Android: guarda o convite nativo
    e.preventDefault(); DEFERRED_INSTALL = e;
    if (btnInstall && !isStandalone()) btnInstall.classList.remove('hidden');
  });
  window.addEventListener('appinstalled', () => {
    DEFERRED_INSTALL = null;
    if (btnInstall) btnInstall.classList.add('hidden');
    toast('Instalado! 🎉 procure o ícone na tela inicial');
  });
  if (btnInstall) btnInstall.onclick = async () => {
    SND.tap();
    if (DEFERRED_INSTALL) {                                                     // Android: dispara o instalador nativo
      DEFERRED_INSTALL.prompt();
      const r = await DEFERRED_INSTALL.userChoice.catch(() => null);
      DEFERRED_INSTALL = null;
      if (r && r.outcome === 'accepted') btnInstall.classList.add('hidden');
      return;
    }
    const passos = isiOS()
      ? `<div class="rules">
           <p>📲 <b>No iPhone/iPad (Safari):</b></p>
           <p>1. Toque em <b>Compartilhar</b> (o quadradinho com a setinha ↑, embaixo).</p>
           <p>2. Role e toque em <b>“Adicionar à Tela de Início”</b>.</p>
           <p>Pronto — vai virar o app <b>Dominó da Galera</b>, sem a barra do navegador.</p>
         </div>`
      : `<div class="rules">
           <p>📲 <b>No Android (Chrome):</b></p>
           <p>1. Toque no menu <b>⋮</b> (três pontinhos, canto superior).</p>
           <p>2. Escolha <b>“Instalar app”</b> (ou “Adicionar à tela inicial”).</p>
           <p>Pronto — vai virar o app <b>Dominó da Galera</b>, em tela cheia.</p>
         </div>`;
    showModal('<h2>Instalar o app</h2>' + passos, [{ label: 'Entendi', fn: closeModal }]);
  };
  $('#btnJoinGo').onclick = () => { SND.unlock(); SND.tap(); joinRoom($('#codeIn').value); };
  $('#codeIn').addEventListener('input', e => e.target.value = e.target.value.toUpperCase());
  $('#codeIn').addEventListener('keydown', e => { if (e.key === 'Enter') $('#btnJoinGo').click(); });

  // sala de espera
  $('#btnLeaveWait').onclick = () => {
    SND.tap();
    if (view.mySeat === view.hostSeat) {
      showModal(`<h2>Fechar a mesa?</h2><p class="sub">todo mundo sai junto</p>`, [
        { label: 'Fechar mesa', fn: () => { closeModal(); NET.DEL('rooms/' + ON.code).catch(() => {}); } },
        { label: 'voltar', ghost: true, fn: closeModal }
      ]);
    } else leaveOnline(true);
  };
  $('#btnWpp').onclick = () => {
    SND.tap();
    window.open('https://wa.me/?text=' + encodeURIComponent(inviteText()), '_blank');
  };
  $('#btnCopy').onclick = async () => {
    SND.tap();
    try { await navigator.clipboard.writeText(inviteText()); $('#btnCopy').textContent = '✅ Copiado!'; }
    catch (e) { $('#btnCopy').textContent = 'Código: ' + ON.code; }
    setTimeout(() => $('#btnCopy').textContent = '📋 Copiar convite', 1800);
  };
  $('#btnMode').onclick = () => {
    if (view.mySeat !== view.hostSeat || !ON.code) return;
    SND.tap();
    hostModePick();
  };
  $('#btnStart').onclick = () => { SND.tap(); startOnline(); };
  $('#btnResume').onclick = () => doResume();
  $('#btnSwap').onclick = () => { SND.tap(); swapSeats(); };

  // jogo
  $('#btnMenu').onclick = () => { SND.tap(); gameMenu(); };
  $('#btnReact').onclick = e => { e.stopPropagation(); SND.unlock(); $('#reactPal').classList.toggle('hidden'); };
  document.addEventListener('click', e => {
    if (!e.target.closest('#reactPal') && !e.target.closest('#btnReact')) hidePal();
  });

  window.addEventListener('resize', () => {
    if ($('#game').classList.contains('hidden')) return;
    const c = $('#chain'); c.classList.add('noanim');
    renderBoard(!!selected);
    setTimeout(() => c.classList.remove('noanim'), 60);
  });

  document.addEventListener('pointerdown', () => SND.unlock(), { once: true });

  // link direto: dominó.html#ABCD
  const h = (location.hash || '').replace('#', '').toUpperCase();
  if (/^[A-Z0-9]{4}$/.test(h)) {
    $('#joinBox').classList.remove('hidden');
    $('#codeIn').value = h;
    $('#nameIn').focus();
    netErr('achou a mesa ' + h + ' — só falta teu nome');
  }

  if (location.search.includes('debug')) window.__D = { view, CORE, NET, ON, LOCAL, startLocal, processG, applyTheme, applySkin, THEMES, SKINS, customize, SND, moveSeat, MODE_LIST, modeMenu, requestPause, doResume, spawnDrift, rerollProp: rerollAmbience, applySize, SIZES, CHAT, pickFresh, FR };
}
boot();
</script>
